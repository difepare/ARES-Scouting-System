version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ares_postgres
    environment:
      POSTGRES_DB: ares_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ares_network

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: ares_backend
    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - ares_network
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: ares_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - ares_network
    volumes:
      - ./frontend:/app

networks:
  ares_network:

volumes:
  postgres_data: